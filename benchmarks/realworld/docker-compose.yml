name: tracedb-realworld-bench

services:
  bench-tracedb:
    profiles: ["lab"]
    build:
      context: ../..
      target: runtime
    image: tracedb-local:bench
    command: ["tracedb-server"]
    environment:
      - TRACEDB_SERVICE_MODE=engine
      - TRACEDB_DATA_DIR=/data/tracedb
      - TRACEDB_BIND=0.0.0.0:8080
      - TRACEDB_LOG_FORMAT=json
    ports:
      - "28081:8080"
    volumes:
      - bench-tracedb-data:/data/tracedb
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 20

  bench-postgres:
    profiles: ["lab"]
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=tracedb_bench
      - POSTGRES_USER=tracedb
      - POSTGRES_PASSWORD=tracedb
    ports:
      - "25432:5432"
    volumes:
      - bench-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracedb -d tracedb_bench"]
      interval: 5s
      timeout: 2s
      retries: 20

  bench-pgvector:
    profiles: ["lab"]
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=tracedb_bench
      - POSTGRES_USER=tracedb
      - POSTGRES_PASSWORD=tracedb
    ports:
      - "25433:5432"
    volumes:
      - bench-pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracedb -d tracedb_bench"]
      interval: 5s
      timeout: 2s
      retries: 20

  bench-mongo:
    profiles: ["lab"]
    image: mongo:7
    ports:
      - "27027:27017"
    volumes:
      - bench-mongo-data:/data/db

  bench-qdrant:
    profiles: ["lab"]
    image: qdrant/qdrant:v1.13.4
    ports:
      - "26333:6333"
      - "26334:6334"
    volumes:
      - bench-qdrant-data:/qdrant/storage

  bench-opensearch:
    profiles: ["lab"]
    image: opensearchproject/opensearch:2.18.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=false
    ports:
      - "29200:9200"
      - "29600:9600"
    volumes:
      - bench-opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  bench-runner:
    profiles: ["lab"]
    image: python:3.12-slim
    working_dir: /lab
    command: ["/bin/sh", "-c", "pip install -r requirements.txt && sleep infinity"]
    environment:
      - TRACEDB_HTTP_URL=http://bench-tracedb:8080
      - BENCH_POSTGRES_DSN=postgresql://tracedb:tracedb@bench-postgres:5432/tracedb_bench
      - BENCH_PGVECTOR_DSN=postgresql://tracedb:tracedb@bench-pgvector:5432/tracedb_bench
      - BENCH_MONGO_URI=mongodb://bench-mongo:27017
      - BENCH_QDRANT_URL=http://bench-qdrant:6333
      - BENCH_OPENSEARCH_URL=http://bench-opensearch:9200
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-}
      - OPENROUTER_EMBED_MODEL=${OPENROUTER_EMBED_MODEL:-}
      - OPENROUTER_COMPARE_EMBED_MODELS=${OPENROUTER_COMPARE_EMBED_MODELS:-}
      - OPENROUTER_JUDGE_MODEL=${OPENROUTER_JUDGE_MODEL:-}
      - OPENROUTER_RERANK_MODEL=${OPENROUTER_RERANK_MODEL:-}
    volumes:
      - .:/lab
      - ../..:/workspace:ro
    depends_on:
      bench-tracedb:
        condition: service_healthy
      bench-postgres:
        condition: service_healthy
      bench-pgvector:
        condition: service_healthy
      bench-mongo:
        condition: service_started
      bench-qdrant:
        condition: service_started
      bench-opensearch:
        condition: service_healthy

volumes:
  bench-tracedb-data:
  bench-postgres-data:
  bench-pgvector-data:
  bench-mongo-data:
  bench-qdrant-data:
  bench-opensearch-data:
