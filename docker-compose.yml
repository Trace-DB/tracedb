name: tracedb-local

services:
  tracedb:
    build:
      context: .
      target: runtime
    image: tracedb-local:latest
    command: ["tracedb-server"]
    environment:
      - TRACEDB_DATA_DIR=/data/tracedb
      - TRACEDB_BIND=0.0.0.0:8080
      - TRACEDB_LOG_FORMAT=json
    ports:
      - "18080:8080"
    volumes:
      - tracedb-data:/data/tracedb
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/v1/health"]
      interval: 5s
      timeout: 2s
      retries: 20

volumes:
  tracedb-data:
