name: tracedb-local-cloud

services:
  tracedb-gateway:
    profiles: ["full"]
    build:
      context: .
      target: runtime
    image: tracedb-local:latest
    command: ["tracedb-server"]
    environment:
      - TRACEDB_SERVICE_MODE=gateway
      - TRACEDB_BIND=0.0.0.0:8080
      - TRACEDB_ENGINE_URL=http://tracedb-engine:8080
      - TRACEDB_CATALOG_URL=postgres://tracedb:tracedb@postgres-catalog:5432/tracedb_catalog
      - TRACEDB_QUEUE_URL=redis://valkey-queue:6379
      - TRACEDB_BUCKET_ENDPOINT=http://minio-bucket:9000
      - TRACEDB_BUCKET_NAME=tracedb-local
      - TRACEDB_LOG_FORMAT=json
    ports:
      - "18080:8080"
    depends_on:
      tracedb-engine:
        condition: service_healthy
      postgres-catalog:
        condition: service_healthy
      valkey-queue:
        condition: service_started
      minio-bucket:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 20

  tracedb-engine:
    profiles: ["full", "lite"]
    build:
      context: .
      target: runtime
    image: tracedb-local:latest
    command: ["tracedb-server"]
    environment:
      - TRACEDB_SERVICE_MODE=engine
      - TRACEDB_DATA_DIR=/data/tracedb
      - TRACEDB_BIND=0.0.0.0:8080
      - TRACEDB_QUEUE_URL=redis://valkey-queue:6379
      - TRACEDB_BUCKET_ENDPOINT=http://minio-bucket:9000
      - TRACEDB_BUCKET_NAME=tracedb-local
      - TRACEDB_LOG_FORMAT=json
    ports:
      - "18081:8080"
    volumes:
      - tracedb-data:/data/tracedb
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 20

  tracedb-worker:
    profiles: ["full"]
    image: tracedb-local:latest
    command: ["tracedb-worker"]
    environment:
      - TRACEDB_BIND=0.0.0.0:8080
      - TRACEDB_ENGINE_URL=http://tracedb-engine:8080
      - TRACEDB_QUEUE_URL=redis://valkey-queue:6379
      - TRACEDB_BUCKET_ENDPOINT=http://minio-bucket:9000
      - TRACEDB_BUCKET_NAME=tracedb-local
      - TRACEDB_LOG_FORMAT=json
    ports:
      - "18082:8080"
    depends_on:
      tracedb-engine:
        condition: service_healthy
      valkey-queue:
        condition: service_started
      minio-bucket:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 20

  postgres-catalog:
    profiles: ["full"]
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=tracedb_catalog
      - POSTGRES_USER=tracedb
      - POSTGRES_PASSWORD=tracedb
    ports:
      - "15432:5432"
    volumes:
      - tracedb-catalog:/var/lib/postgresql/data
      - ./deploy/local/catalog-init.sql:/docker-entrypoint-initdb.d/001-tracedb-catalog.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracedb -d tracedb_catalog"]
      interval: 5s
      timeout: 2s
      retries: 20

  valkey-queue:
    profiles: ["full"]
    image: valkey/valkey:7-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - tracedb-queue:/data

  minio-bucket:
    profiles: ["full"]
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      - MINIO_ROOT_USER=tracedb
      - MINIO_ROOT_PASSWORD=tracedb-local-password
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - tracedb-bucket:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 20

  minio-init:
    profiles: ["full"]
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio-bucket:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio-bucket:9000 tracedb tracedb-local-password
        mc mb --ignore-existing local/tracedb-local
        mc anonymous set none local/tracedb-local

volumes:
  tracedb-data:
  tracedb-catalog:
  tracedb-queue:
  tracedb-bucket:
