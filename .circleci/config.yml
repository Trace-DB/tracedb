version: 2.1

jobs:
  tracedb:
    docker:
      - image: cimg/rust:1.89
    resource_class: large
    steps:
      - checkout
      - setup_remote_docker
      - restore_cache:
          keys:
            - cargo-v1-{{ checksum "Cargo.lock" }}
            - cargo-v1-
      - run:
          name: Rust tests
          command: cargo test --workspace --all-targets -- --test-threads=1
      - run:
          name: Clippy
          command: cargo clippy --workspace -- -D warnings
      - run:
          name: Formatting
          command: cargo fmt --all -- --check
      - run:
          name: OpenAPI drift
          command: python3 scripts/generate_openapi_v1.py --check
      - run:
          name: Platform conformance smoke
          command: python3 scripts/platform_conformance.py --surface http_direct --summary-json "${CIRCLE_ARTIFACTS:-/tmp}/tracedb-platform-conformance.json"
      - run:
          name: Docker lite smoke
          command: |
            cleanup() {
              status=$?
              if [ "$status" -ne 0 ]; then
                docker compose ps -a tracedb || true
                docker compose logs --no-color tracedb || true
              fi
              docker compose down -v --remove-orphans || true
            }
            trap cleanup EXIT
            docker build -t tracedb-local:test .
            docker tag tracedb-local:test tracedb-local:latest
            docker compose up -d tracedb
            docker compose ps -a tracedb
            container_id="$(docker compose ps -q tracedb)"
            if [ -z "$container_id" ]; then
              echo "tracedb compose container was not created"
              exit 1
            fi
            health_status="unknown"
            for _ in $(seq 1 60); do
              health_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"
              if [ "$health_status" = "healthy" ]; then
                break
              fi
              if [ "$health_status" = "unhealthy" ] || [ "$health_status" = "exited" ]; then
                echo "tracedb container reached terminal state: $health_status"
                exit 1
              fi
              sleep 2
            done
            if [ "$health_status" != "healthy" ]; then
              echo "tracedb container did not become healthy; last status: $health_status"
              exit 1
            fi
            docker run --rm --network host curlimages/curl:8.13.0 -fsS http://127.0.0.1:18080/v1/health
            docker compose down -v --remove-orphans
            trap - EXIT
      - run:
          name: Cargo audit
          command: |
            cargo install cargo-audit
            cargo audit
      - save_cache:
          key: cargo-v1-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - target

workflows:
  ci:
    jobs:
      - tracedb:
          name: circleci/tracedb
          filters:
            tags:
              only: /^v.*/
