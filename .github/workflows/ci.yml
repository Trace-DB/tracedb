name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-test:
    name: Rust tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-targets -- --test-threads=1

  rust-lint:
    name: Rust lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Check formatting
        run: cargo fmt --all -- --check

  contract-generation-drift:
    name: Contract generation drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check OpenAPI artifact drift
        run: python3 scripts/generate_openapi_v1.py --check

  platform-conformance-smoke:
    name: Platform conformance smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run HTTP direct conformance
        run: >-
          python3 scripts/platform_conformance.py
          --surface http_direct
          --summary-json "${RUNNER_TEMP}/tracedb-platform-conformance.json"

  docker-lite:
    name: Docker lite smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t tracedb-local:test .
      - name: Start lite compose profile
        run: |
          docker tag tracedb-local:test tracedb-local:latest
          docker compose up -d tracedb
          docker compose ps -a tracedb
          curl --retry 20 --retry-all-errors --retry-delay 3 -fsS http://localhost:18080/v1/health
      - name: Show lite compose logs
        if: failure()
        run: |
          docker compose ps -a
          docker compose logs tracedb
      - name: Stop lite compose profile
        if: always()
        run: docker compose down -v --remove-orphans

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo audit
        run: cargo audit
