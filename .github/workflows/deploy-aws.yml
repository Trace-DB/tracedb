name: Deploy AWS (manual plan)

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Immutable GHCR image tag or digest to promote."
        required: true
        type: string
      environment_name:
        description: "GitHub/AWS environment name, for example staging or production."
        required: true
        default: "staging"
        type: string
      runtime:
        description: "AWS runtime target. This stub currently plans EC2/Elastic Beanstalk promotion only."
        required: true
        default: "ec2-ebs"
        type: choice
        options:
          - ec2-ebs
      service_mode:
        description: "TraceDB service mode being promoted."
        required: true
        default: "engine"
        type: choice
        options:
          - engine
          - gateway
          - worker
          - full
      run_smoke:
        description: "Run post-deploy smoke if endpoint_url is provided."
        required: true
        default: true
        type: boolean
      snapshot_before_deploy:
        description: "Plan a pre-deploy snapshot/checkpoint step before promotion. No snapshot is created by this stub."
        required: true
        default: true
        type: boolean
      endpoint_url:
        description: "Optional deployed endpoint URL. When set with run_smoke, invokes post-deploy-smoke.yml."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  plan:
    name: Plan AWS promotion
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    concurrency:
      group: deploy-aws-${{ inputs.environment_name }}
      cancel-in-progress: false
    env:
      IMAGE_REF: ${{ inputs.image_ref }}
      ENVIRONMENT_NAME: ${{ inputs.environment_name }}
      RUNTIME: ${{ inputs.runtime }}
      SERVICE_MODE: ${{ inputs.service_mode }}
      RUN_SMOKE: ${{ inputs.run_smoke }}
      SNAPSHOT_BEFORE_DEPLOY: ${{ inputs.snapshot_before_deploy }}
      ENDPOINT_URL: ${{ inputs.endpoint_url }}
      HAS_AWS_ROLE_TO_ASSUME_SECRET: ${{ secrets.AWS_ROLE_TO_ASSUME != '' }}
      HAS_AWS_ROLE_TO_ASSUME_VAR: ${{ vars.AWS_ROLE_TO_ASSUME != '' }}
      HAS_AWS_REGION_SECRET: ${{ secrets.AWS_REGION != '' }}
      HAS_AWS_REGION_VAR: ${{ vars.AWS_REGION != '' }}
      HAS_AWS_SSM_INSTANCE_ID_SECRET: ${{ secrets.AWS_SSM_INSTANCE_ID != '' }}
      HAS_AWS_SSM_INSTANCE_ID_VAR: ${{ vars.AWS_SSM_INSTANCE_ID != '' }}
      HAS_AWS_EBS_APP_SECRET: ${{ secrets.AWS_EBS_APPLICATION_NAME != '' }}
      HAS_AWS_EBS_APP_VAR: ${{ vars.AWS_EBS_APPLICATION_NAME != '' }}
      HAS_AWS_EBS_ENV_SECRET: ${{ secrets.AWS_EBS_ENVIRONMENT_NAME != '' }}
      HAS_AWS_EBS_ENV_VAR: ${{ vars.AWS_EBS_ENVIRONMENT_NAME != '' }}
    steps:
      - name: Validate AWS deploy inputs
        shell: bash
        run: |
          set -euo pipefail
          case "$IMAGE_REF" in
            ghcr.io/*@sha256:*|ghcr.io/*:*) ;;
            *) echo "image_ref must be an immutable GHCR tag or digest, for example ghcr.io/org/repo:v1.2.3 or ghcr.io/org/repo@sha256:..." >&2; exit 1 ;;
          esac
          case "$RUNTIME" in
            ec2-ebs) ;;
            *) echo "Unsupported runtime: $RUNTIME" >&2; exit 1 ;;
          esac
          case "$SERVICE_MODE" in
            engine|gateway|worker|full) ;;
            *) echo "Unsupported service_mode: $SERVICE_MODE" >&2; exit 1 ;;
          esac
          if [ -n "$ENDPOINT_URL" ]; then
            case "$ENDPOINT_URL" in
              http://*|https://*) ;;
              *) echo "endpoint_url must start with http:// or https:// when provided" >&2; exit 1 ;;
            esac
          fi

      - name: Print safe AWS promotion plan
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## AWS deploy plan (no changes applied)"
            echo
            echo "This workflow is a manual promotion stub. It does not deploy, restart, mutate AWS resources, or create snapshots by default."
            echo
            echo "### Requested promotion"
            echo "- Environment: \`$ENVIRONMENT_NAME\`"
            echo "- Runtime: \`$RUNTIME\`"
            echo "- Service mode: \`$SERVICE_MODE\`"
            echo "- Image ref: \`$IMAGE_REF\`"
            echo "- Snapshot before deploy requested: \`$SNAPSHOT_BEFORE_DEPLOY\`"
            echo "- Smoke requested: \`$RUN_SMOKE\`"
            if [ -n "$ENDPOINT_URL" ]; then
              echo "- Smoke endpoint: \`$ENDPOINT_URL\`"
            else
              echo "- Smoke endpoint: not provided; post-deploy smoke will be skipped."
            fi
            echo
            echo "### Required AWS configuration"
            echo "Configure these as GitHub environment/repository vars or secrets before replacing this stub with guarded deploy commands:"
            echo "- \`AWS_ROLE_TO_ASSUME\`: OIDC role ARN for this workflow. Present as secret: \`$HAS_AWS_ROLE_TO_ASSUME_SECRET\`; present as var: \`$HAS_AWS_ROLE_TO_ASSUME_VAR\`."
            echo "- \`AWS_REGION\`: AWS region. Present as secret: \`$HAS_AWS_REGION_SECRET\`; present as var: \`$HAS_AWS_REGION_VAR\`."
            echo "- \`AWS_SSM_INSTANCE_ID\`: EC2 instance id for an SSM-based promotion path. Present as secret: \`$HAS_AWS_SSM_INSTANCE_ID_SECRET\`; present as var: \`$HAS_AWS_SSM_INSTANCE_ID_VAR\`."
            echo "- \`AWS_EBS_APPLICATION_NAME\`: Elastic Beanstalk application name, if using EBS. Present as secret: \`$HAS_AWS_EBS_APP_SECRET\`; present as var: \`$HAS_AWS_EBS_APP_VAR\`."
            echo "- \`AWS_EBS_ENVIRONMENT_NAME\`: Elastic Beanstalk environment name, if using EBS. Present as secret: \`$HAS_AWS_EBS_ENV_SECRET\`; present as var: \`$HAS_AWS_EBS_ENV_VAR\`."
            echo "- \`TRACEDB_SMOKE_TOKEN\`: optional bearer token used only by post-deploy smoke."
            echo
            echo "### Guarded implementation placeholder"
            echo "A future deploy job may assume \`AWS_ROLE_TO_ASSUME\`, verify \`$IMAGE_REF\` exists in GHCR, optionally create a snapshot, then run a tightly-scoped SSM command such as:"
            echo
            echo "\`\`\`text"
            echo "aws ssm send-command --instance-ids <AWS_SSM_INSTANCE_ID> --document-name AWS-RunShellScript --parameters commands='<pull pinned image, update service, verify digest>'"
            echo "\`\`\`"
            echo
            echo "Do not add destructive commands without environment protection rules and an explicit operator approval gate."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record no-op deployment receipt
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          receipt = {
              "provider": "aws",
              "environment_name": os.environ["ENVIRONMENT_NAME"],
              "runtime": os.environ["RUNTIME"],
              "service_mode": os.environ["SERVICE_MODE"],
              "image_ref": os.environ["IMAGE_REF"],
              "snapshot_before_deploy_requested": os.environ["SNAPSHOT_BEFORE_DEPLOY"] == "true",
              "status": "planned-noop",
              "mutated_resources": False,
              "created_at": datetime.now(timezone.utc).isoformat(),
          }
          path = os.path.join(os.environ["RUNNER_TEMP"], "tracedb-aws-deploy-plan-receipt.json")
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(receipt, handle, indent=2, sort_keys=True)
              handle.write("\n")
          print(path)
          PY

      - name: Smoke skip notice
        if: ${{ inputs.run_smoke && inputs.endpoint_url == '' }}
        shell: bash
        run: |
          echo "run_smoke=true but endpoint_url is empty. Re-run this workflow with endpoint_url, or manually run Post-deploy smoke after promotion." >> "$GITHUB_STEP_SUMMARY"

  smoke:
    name: Post-deploy smoke
    needs: plan
    if: ${{ inputs.run_smoke && inputs.endpoint_url != '' }}
    uses: ./.github/workflows/post-deploy-smoke.yml
    with:
      provider: aws
      environment_name: ${{ inputs.environment_name }}
      endpoint_url: ${{ inputs.endpoint_url }}
      image_ref: ${{ inputs.image_ref }}
      database_id: ""
      branch_id: ""
      run_readonly_doctor: false
    secrets:
      TRACEDB_SMOKE_TOKEN: ${{ secrets.TRACEDB_SMOKE_TOKEN }}
