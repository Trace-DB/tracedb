name: Release container

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  checks: read
  statuses: read

env:
  IMAGE_TITLE: tracedb

jobs:
  ghcr:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    environment: ghcr
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      checks: read
      statuses: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify CircleCI readiness
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REQUIRED_CIRCLECI_CHECK: "ci/circleci: circleci/tracedb"
          REQUIRED_CIRCLECI_CHECKS: "ci/circleci: circleci/tracedb,ci"
          CIRCLECI_READINESS_REQUIRE_FRESH: "true"
          CIRCLECI_READINESS_FRESH_AFTER: ${{ github.event.repository.pushed_at }}
          CIRCLECI_READINESS_FRESH_GRACE_SECONDS: "120"
        run: bash .github/scripts/verify-circleci-readiness.sh
      - name: Verify tag matches workspace version
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys
          text = open("Cargo.toml", encoding="utf-8").read()
          match = re.search(r'^\[workspace\.package\]\s+.*?^version\s*=\s*"([^"]+)"', text, re.MULTILINE | re.DOTALL)
          if not match:
              print("Could not find workspace package version.", file=sys.stderr)
              raise SystemExit(1)
          expected = f"v{match.group(1)}"
          tag = os.environ.get("GITHUB_REF_NAME", "")
          if tag != expected:
              print(f"Release tag {tag} does not match workspace version {expected}.", file=sys.stderr)
              raise SystemExit(1)
          PY
      - name: Resolve image name
        id: image
        shell: bash
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_TITLE }}
            org.opencontainers.image.licenses=Apache-2.0
      - name: Build and publish image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Attest image provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-name: ${{ steps.image.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
